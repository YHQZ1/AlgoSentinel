version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: algo_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - sentinel_net

  trading_bot:
    build: ./bot
    container_name: algo_bot
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    networks:
      - sentinel_net

  ai_sentinel:
    build: ./sentinel
    container_name: algo_sentinel
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./sentinel_model.pth:/app/sentinel_model.pth
      - ./scaler.pkl:/app/scaler.pkl
      - ./global_min.npy:/app/global_min.npy
      - ./global_max.npy:/app/global_max.npy
    networks:
      - sentinel_net

  dashboard:
    build: ./dashboard
    container_name: algo_dashboard
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - redis
    networks:
      - sentinel_net

networks:
  sentinel_net:
    driver: bridge