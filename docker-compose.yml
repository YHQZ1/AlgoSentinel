services:
  redis:
    image: redis:alpine
    container_name: algo_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - sentinel_net

  trading_bot:
    build: ./bot
    container_name: algo_bot
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    networks:
      - sentinel_net

  ai_sentinel:
    build: ./sentinel
    container_name: algo_sentinel
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./sentinel_model.pth:/app/sentinel_model.pth
      - ./scaler.pkl:/app/scaler.pkl
      - ./global_min.npy:/app/global_min.npy
      - ./global_max.npy:/app/global_max.npy
    networks:
      - sentinel_net

  # FastAPI Backend
  api:
    build: ./api
    container_name: algo_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3

  # React Frontend
  frontend:
    build: ./frontend
    container_name: algo_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - sentinel_net

  # Legacy Streamlit Dashboard (Optional - can be removed if needed)
  dashboard:
    build: ./dashboard
    container_name: algo_dashboard
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - redis
    networks:
      - sentinel_net

networks:
  sentinel_net:
    driver: bridge
